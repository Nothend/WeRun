name: Build and Push Docker Image to Aliyun (On Tag)

on:
  push:
    tags: ['v*']

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY_URL }}
          username: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.ALIYUN_REGISTRY_URL }}/${{ secrets.ALIYUN_REGISTRY_NAMESPACE }}/werun
          tags: |
            type=semver,pattern={{version}},event=tag
            type=raw,value=latest,event=tag

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          # 后端代码在 server/ 子目录
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_VERSION=${{ github.ref_name }}

      - name: Deploy to ECS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ALIYUN_ECS_IP }}
          username: ${{ secrets.ALIYUN_ECS_USERNAME }}
          password: ${{ secrets.ALIYUN_ECS_PASSWORD }}
          port: ${{ secrets.ALIYUN_ECS_PORT || 22 }}
          strict: false
          script: |
            set -e
            echo "===== 登录阿里云镜像仓库 ====="
            echo "${{ secrets.ALIYUN_REGISTRY_PASSWORD }}" | docker login ${{ secrets.ALIYUN_REGISTRY_URL }} \
              -u "${{ secrets.ALIYUN_REGISTRY_USERNAME }}" --password-stdin

            echo "===== 进入部署目录并更新容器 ====="
            cd /dockers/werun
            docker compose pull
            docker compose up -d

            echo "===== 清理无用镜像 ====="
            docker image prune -f
            echo "===== 🎉 部署完成 ====="

      - name: Output final workflow status
        if: always()
        run: |
          if [[ "${{ job.status }}" == "success" ]]; then
            echo "✅ 工作流执行成功：镜像已推送至阿里云，ECS 容器已更新"
          else
            echo "❌ 工作流执行失败：请查看上方步骤日志排查"
            exit 1
          fi
