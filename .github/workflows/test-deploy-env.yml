name: Test Deploy Environment

# 手动触发，用于在首次正式发布前验证所有 Secret 和服务器环境是否就绪
on:
  workflow_dispatch:

jobs:
  test:
    name: Validate secrets / ACR login / SSH deploy
    runs-on: ubuntu-latest

    steps:
      # ──────────────────────────────────────────────
      # 1. 检查所有必要 Secret 是否已填写
      # ──────────────────────────────────────────────
      - name: Check required secrets
        env:
          REGISTRY_URL:       ${{ secrets.ALIYUN_REGISTRY_URL }}
          REGISTRY_USERNAME:  ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          REGISTRY_PASSWORD:  ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}
          REGISTRY_NAMESPACE: ${{ secrets.ALIYUN_REGISTRY_NAMESPACE }}
          ECS_IP:             ${{ secrets.ALIYUN_ECS_IP }}
          ECS_USERNAME:       ${{ secrets.ALIYUN_ECS_USERNAME }}
          ECS_PASSWORD:       ${{ secrets.ALIYUN_ECS_PASSWORD }}
        run: |
          ALL_OK=true
          check() {
            if [ -z "$2" ]; then
              echo "❌  $1 未设置"
              ALL_OK=false
            else
              echo "✅  $1 已设置"
            fi
          }
          check "ALIYUN_REGISTRY_URL"       "$REGISTRY_URL"
          check "ALIYUN_REGISTRY_USERNAME"  "$REGISTRY_USERNAME"
          check "ALIYUN_REGISTRY_PASSWORD"  "$REGISTRY_PASSWORD"
          check "ALIYUN_REGISTRY_NAMESPACE" "$REGISTRY_NAMESPACE"
          check "ALIYUN_ECS_IP"             "$ECS_IP"
          check "ALIYUN_ECS_USERNAME"       "$ECS_USERNAME"
          check "ALIYUN_ECS_PASSWORD"       "$ECS_PASSWORD"
          # ECS_PORT 可选，缺省 22
          if [ -z "${{ secrets.ALIYUN_ECS_PORT }}" ]; then
            echo "ℹ️   ALIYUN_ECS_PORT 未设置，将使用默认端口 22"
          else
            echo "✅  ALIYUN_ECS_PORT 已设置"
          fi

          if [ "$ALL_OK" = "false" ]; then
            echo ""
            echo "请在仓库 Settings → Secrets and variables → Actions 补全上列缺失项"
            exit 1
          fi

      # ──────────────────────────────────────────────
      # 2. 登录阿里云镜像仓库
      # ──────────────────────────────────────────────
      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY_URL }}
          username: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Confirm ACR login success
        run: echo "✅  阿里云镜像仓库登录成功：${{ secrets.ALIYUN_REGISTRY_URL }}"

      # ──────────────────────────────────────────────
      # 3. SSH 登录 ECS，验证部署目录和 Docker 环境
      # ──────────────────────────────────────────────
      - name: SSH — verify deploy directory and update container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.ALIYUN_ECS_IP }}
          username: ${{ secrets.ALIYUN_ECS_USERNAME }}
          password: ${{ secrets.ALIYUN_ECS_PASSWORD }}
          port:     ${{ secrets.ALIYUN_ECS_PORT || 22 }}
          strict:   false
          script: |
            set -e

            echo "===== ✅  SSH 连接成功 ====="

            echo "===== 检查 Docker ====="
            docker version --format '{{.Server.Version}}' && echo "✅  Docker 可用"

            echo "===== 检查 docker compose ====="
            docker compose version && echo "✅  docker compose 可用"

            echo "===== 进入部署目录 ====="
            cd /dockers/werun
            echo "✅  /dockers/werun 目录存在"

            echo "===== 目录文件列表 ====="
            ls -la

            echo "===== 验证 .env 文件 ====="
            if [ ! -f .env ]; then
              echo "❌  .env 不存在，请参照 server/.env.example 创建"
              exit 1
            fi
            echo "✅  .env 存在"

            echo "===== 验证 docker-compose.yml ====="
            docker compose config --quiet && echo "✅  compose 配置解析正常"

            echo "===== 登录阿里云镜像仓库（ECS 侧）====="
            echo "${{ secrets.ALIYUN_REGISTRY_PASSWORD }}" | \
              docker login ${{ secrets.ALIYUN_REGISTRY_URL }} \
              -u "${{ secrets.ALIYUN_REGISTRY_USERNAME }}" --password-stdin
            echo "✅  ECS 侧 ACR 登录成功"

            echo "===== 拉取最新镜像并更新容器 ====="
            docker compose pull
            docker compose up -d
            echo "✅  容器已更新"

            echo "===== 容器运行状态 ====="
            docker compose ps

            echo "===== 🎉 所有检查通过，部署环境就绪 ====="
